spring.application.name=PharmacareApplication

# Server Configuration
server.port=8080

# MySQL Datasource Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/medic?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/medic?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA Configuration
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-circular-references=true

